worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml application/rss+xml image/svg+xml;

    server {
        listen 3000;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        # Main location
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Serve audio files with proper MIME type and long cache
        location /audio/ {
            types {
                audio/mpeg mp3;
                audio/ogg ogg;
                audio/wav wav;
            }
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Range";
        }

        # JSON files with proper MIME type
        location ~* \.json$ {
            types {
                application/json json;
            }
            add_header Cache-Control "public, max-age=3600";
            add_header Access-Control-Allow-Origin "*";
        }

        # Cache static assets
        location ~* \.(html|css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            add_header Cache-Control "public, max-age=3600";
        }

        # Disable caching for index.html (always fetch latest)
        location = /index.html {
            add_header Cache-Control "no-cache, must-revalidate";
        }

        # CORS headers for all requests
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range, Content-Type" always;

        # Handle OPTIONS preflight requests
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }
}
